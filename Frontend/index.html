<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HSE Connect — Главная</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Подключаем стили -->
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/home.css">

    <!-- Подключаем Web Components -->
    <script src="js/components.js" defer></script>
</head>

<body>
    <hse-header></hse-header>

    <div class="page">
        <hse-sidebar></hse-sidebar>

        <main class="content">
            <!-- Приветственный баннер -->
            <div class="welcome-banner">
                <div class="welcome-text">
                    <h1 id="welcomeTitle">Добро пожаловать! 👋</h1>
                    <p>Создавай события и приглашай друзей</p>
                </div>
                <button class="create-event-btn" id="openModalBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Создать событие
                </button>
            </div>

            <!-- Ближайшие события -->
            <div class="events-section">
                <div class="events-header">
                    <h3>📅 Ближайшие события</h3>
                </div>
                <div class="events-list" id="eventsList">
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно для создания события -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <h2>Создать новое событие</h2>
            <input type="text" id="eventTitle" placeholder="Название события">
            <select id="eventType">
                <option value="Учёба">Учёба</option>
                <option value="Спорт">Спорт</option>
                <option value="Вечеринка">Вечеринка</option>
                <option value="Образование">Образование</option>
                <option value="Развлечения">Развлечения</option>
                <option value="Общение">Общение</option>
            </select>
            <input type="text" id="eventLocation" placeholder="Место проведения">
            <input type="date" id="eventDate">
            <input type="time" id="eventTime">
            <textarea id="eventDescription" placeholder="Описание события"></textarea>
            <div class="modal-buttons">
                <button class="cancel-btn" id="closeModalBtn">Отмена</button>
                <button class="submit-btn" id="createEventBtn">Создать</button>
            </div>
        </div>
    </div>

    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <h2 id="detailsTitle">Название события</h2>

            <p><b>Тип:</b> <span id="detailsType"></span></p>
            <p><b>Место:</b> <span id="detailsLocation"></span></p>
            <p><b>Дата:</b> <span id="detailsDate"></span></p>
            <p><b>Время:</b> <span id="detailsTime"></span></p>
            <p><b>Описание:</b></p>
            <p id="detailsDescription"></p>

            <div class="modal-buttons">
                <button class="cancel-btn" id="closeDetailsBtn">Закрыть</button>
                <button class="submit-btn" id="respondEventBtn">Откликнуться</button>
            </div>
        </div>
    </div>

    <script src="scripts/api.js"></script>

    <script>
        let events = [];
        let selectedEventId = null;

        async function loadUserName() {
            try {
                const userId = localStorage.getItem("userId");

                if (!userId) {
                    console.log("userId не найден");
                    return;
                }

                const profile = await apiGet(`/api/profile/${userId}`);

                const firstName = profile.firstName || "";

                document.getElementById("welcomeTitle").textContent =
                    firstName
                        ? `Добро пожаловать, ${firstName}! 👋`
                        : "Добро пожаловать! 👋";

            } catch (error) {
                console.error("Ошибка загрузки имени пользователя:", error);
            }
        }

        function renderEvents() {
            const container = document.getElementById('eventsList');
            if (!container) return;

            container.innerHTML = '';

            events.forEach(event => {
                const dateObj = new Date(event.date);
                const day = dateObj.getDate().toString();
                const month = dateObj.toLocaleString('ru', { month: 'short' }).replace('.', '');

                const eventItem = document.createElement('div');
                eventItem.className = 'event-item';

                eventItem.innerHTML = `
    <div class="event-date">
        <div class="event-day">${day}</div>
        <div class="event-month">${month}</div>
    </div>

    <div class="event-info">
        <div class="event-title">${escapeHtml(event.title)}</div>
        <div class="event-location">${escapeHtml(event.location)}, ${escapeHtml(event.time)}</div>
    </div>

    <div class="event-badge">${escapeHtml(event.type)}</div>
`;

                eventItem.addEventListener("click", () => {
                    openDetailsModal(event);
                });

                container.appendChild(eventItem);
            });
        }

        async function loadEvents() {
            try {
                events = await apiGet("/api/events");
                renderEvents();
            } catch (error) {
                console.error("Ошибка загрузки событий:", error);
                alert("Не удалось загрузить события");
            }
        }

        const modal = document.getElementById('eventModal');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const createBtn = document.getElementById('createEventBtn');

        const detailsModal = document.getElementById("detailsModal");
        const closeDetailsBtn = document.getElementById("closeDetailsBtn");
        const respondEventBtn = document.getElementById("respondEventBtn");

        closeDetailsBtn.addEventListener("click", closeDetailsModal);
        respondEventBtn.addEventListener("click", respondToEvent);

        detailsModal.addEventListener("click", (e) => {
            if (e.target === detailsModal) closeDetailsModal();
        });

        openBtn.addEventListener('click', () => {
            modal.classList.add('active');
        });

        closeBtn.addEventListener('click', closeModal);

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        createBtn.addEventListener('click', createNewEvent);

        async function createNewEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const type = document.getElementById('eventType').value;
            const location = document.getElementById('eventLocation').value.trim();
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const description = document.getElementById('eventDescription').value.trim();

            if (!title || !location || !date || !time) {
                alert('Пожалуйста, заполните название, место, дату и время');
                return;
            }

            const newEvent = {
                title,
                type,
                location,
                date,
                time,
                description
            };

            try {
                await apiPost("/api/events", newEvent);
                await loadEvents();
                closeModal();
                alert('Событие успешно создано!');
            } catch (error) {
                console.error("Ошибка создания события:", error);
                alert("Не удалось создать событие");
            }
        }

        function openDetailsModal(event) {
            selectedEventId = event.id;

            document.getElementById("detailsTitle").textContent = event.title || "Событие";
            document.getElementById("detailsType").textContent = event.type || "";
            document.getElementById("detailsLocation").textContent = event.location || "";
            document.getElementById("detailsDate").textContent = event.date || "";
            document.getElementById("detailsTime").textContent = event.time || "";
            document.getElementById("detailsDescription").textContent =
                event.description || "Описание отсутствует";

            document.getElementById("detailsModal").classList.add("active");
            document.getElementById("respondEventBtn")
                .addEventListener("click", respondToEvent);
        }

        function closeDetailsModal() {
            document.getElementById("detailsModal").classList.remove("active");
            selectedEventId = null;
        }

        async function respondToEvent() {
            if (!selectedEventId) return;

            try {
                await apiPost(`/api/events/${selectedEventId}/respond`, {});

                closeDetailsModal();
                alert("Вы откликнулись на событие!");

                await loadEvents();
            } catch (error) {
                closeDetailsModal();

                console.error("Ошибка отклика на событие:", error);

                alert(error.message || "Не удалось откликнуться на событие");
            }
        }

        function closeModal() {
            modal.classList.remove('active');

            document.getElementById('eventTitle').value = '';
            document.getElementById('eventType').value = 'Учёба';
            document.getElementById('eventLocation').value = '';
            document.getElementById('eventDate').value = '';
            document.getElementById('eventTime').value = '';
            document.getElementById('eventDescription').value = '';
        }

        function escapeHtml(str) {
            if (!str) return "";

            return String(str).replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }


        loadUserName();
        loadEvents();
    </script>
</body>

</html>
