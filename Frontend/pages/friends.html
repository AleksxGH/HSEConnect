<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Связи — HSE Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/friends.css">

    <script src="../js/avatar.js"></script>
    <script src="../js/components.js" defer></script>

    <style>
        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .page {
            display: grid;
            grid-template-columns: 210px 1fr;
            gap: 18px;
            padding: 14px 16px 18px;
            flex: 1;
            min-height: 0;
        }

        .content {
            min-width: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        @media (max-width: 900px) {
            .page {
                grid-template-columns: 1fr;
            }
        }

        /* Дополнительные стили для кнопок */
        .friend-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
    </style>
</head>

<body>
    <hse-header></hse-header>

    <div class="page">
        <hse-sidebar></hse-sidebar>

        <main class="content">
            <div class="friends-section">
                <div class="friends-header">
                    <h1>Связи</h1>
                    <div class="search-container">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
                        <button class="clear-search" id="clearSearch">✖</button>
                    </div>
                </div>

                <div class="friends-tabs">
                    <button class="tab-btn" data-tab="all">Все пользователи</button>
                    <button class="tab-btn active" data-tab="friends">Друзья</button>
                    <button class="tab-btn" data-tab="followers">Подписчики</button>
                    <button class="tab-btn" data-tab="following">Подписки</button>
                </div>

                <div class="friends-list-container" id="friendsContainer">
                    <!-- Список будет загружен через JavaScript -->
                </div>
            </div>
        </main>
    </div>
    <script>
        const LOCAL_API = "http://localhost:8080";
        const SERVER_API = "https://hseconnect.onrender.com";

        const API_URL =
            window.location.hostname === "localhost" ||
                window.location.hostname === "127.0.0.1"
                ? LOCAL_API
                : SERVER_API;

        const currentUserId = Number(localStorage.getItem('userId'));

        let currentTab = 'friends';
        let searchQuery = '';
        let currentData = [];

        function requireAuth() {
            const userId = localStorage.getItem('userId');

            if (!userId) {
                window.location.replace('auth.html');
            }
        }

        requireAuth();

        function getEndpointByTab() {
            if (currentTab === 'all') {
                return `${API_URL}/api/users/all/${currentUserId}`;
            }

            if (currentTab === 'friends') {
                return `${API_URL}/api/friends/${currentUserId}`;
            }

            if (currentTab === 'followers') {
                return `${API_URL}/api/friends/${currentUserId}/followers`;
            }

            if (currentTab === 'following') {
                return `${API_URL}/api/friends/${currentUserId}/following`;
            }

            return `${API_URL}/api/friends/${currentUserId}`;
        }

        async function loadFriendsData() {
            const container = document.getElementById('friendsContainer');
            if (!container) return;

            try {
                const response = await fetch(getEndpointByTab());

                if (!response.ok) {
                    const errorText = await response.text();
                    alert(errorText || 'Не удалось загрузить данные');
                    currentData = [];
                    renderFriends();
                    return;
                }

                currentData = await response.json();
                renderFriends();

            } catch (error) {
                console.error(error);
                alert('Ошибка соединения с сервером');
                currentData = [];
                renderFriends();
            }
        }

        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');

            tabs.forEach(tab => {
                tab.addEventListener('click', async () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    currentTab = tab.getAttribute('data-tab');
                    await loadFriendsData();
                });
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearch');

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.trim().toLowerCase();
                renderFriends();
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchQuery = '';
                renderFriends();
            });
        }

        function getEmptyText() {
            if (currentTab === 'all') {
                return 'Пользователи не найдены';
            }

            if (currentTab === 'friends') {
                return 'У вас пока нет друзей';
            }

            if (currentTab === 'followers') {
                return 'На вас пока никто не подписан';
            }

            if (currentTab === 'following') {
                return 'Вы пока ни на кого не подписаны';
            }

            return 'Список пуст';
        }

        function isUserFriend(user) {
            return user.friend === true || user.isFriend === true;
        }

        function isUserFollowing(user) {
            return user.following === true || user.isFollowing === true;
        }

        function getUserName(user) {
            if (user.name) return user.name;
            if (user.fullName) return user.fullName;
            if (user.firstName && user.lastName) return `${user.firstName} ${user.lastName}`;
            if (user.firstName) return user.firstName;
            return 'Пользователь';
        }

        function getUserAvatarHtml(user) {
    const avatarUrl = user.avatarUrl || user.photoUrl;

    if (avatarUrl && avatarUrl.trim() && avatarUrl.startsWith("http")) {
        return `
            <img 
                src="${escapeHtml(avatarUrl)}" 
                alt=""
                onerror="this.style.display='none'; this.parentElement.textContent='${escapeHtml(getUserName(user).substring(0, 1).toUpperCase())}'"
                style="width:100%;height:100%;border-radius:50%;object-fit:cover;"
            >
        `;
    }

    const name = getUserName(user);
    return escapeHtml(name.substring(0, 1).toUpperCase());
}
        function renderFriends() {
            const container = document.getElementById('friendsContainer');
            if (!container) return;

            let data = [...currentData];

            if (searchQuery) {
                data = data.filter(user =>
                    getUserName(user).toLowerCase().includes(searchQuery)
                );
            }

            if (data.length === 0) {
                const noResultsText = searchQuery
                    ? `Ничего не найдено по запросу "${searchQuery}"`
                    : getEmptyText();

                container.innerHTML = `
                <div class="empty-friends">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="#8792b0" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <p>${noResultsText}</p>
                </div>
            `;
                return;
            }

            let html = '<div class="friends-list">';

            data.forEach(user => {
                if (currentTab === 'all' && user.id === currentUserId) {
                    return;
                }

                const statusClass = user.status === 'online' ? 'online' : 'offline';
                const statusText = user.status === 'online' ? 'В сети' : 'Не в сети';
                const mutualFriendsText = user.mutualFriends
                    ? ` • ${user.mutualFriends} общих друзей`
                    : '';

                html += `
                <div class="friend-card" onclick="openUserProfile(${user.id})">
                    <div class="friend-avatar">
                        ${getUserAvatarHtml(user)}
                    </div>

                    <div class="friend-info">
                        <div class="friend-name">${escapeHtml(getUserName(user))}</div>
                        <div class="friend-status">
                            <span class="status-dot ${statusClass}"></span>
                            ${statusText}
                            ${mutualFriendsText}
                        </div>
                    </div>

                    <div class="friend-actions" onclick="event.stopPropagation()">
                        ${getButtonsHtml(user)}
                    </div>
                </div>
            `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function openUserProfile(userId) {
            if (!userId) return;
            window.location.href = `./user.html?id=${userId}`;
        }

        window.openUserProfile = openUserProfile;

        function getButtonsHtml(user) {
            const userId = user.id;
            const name = escapeHtml(getUserName(user)).replace(/'/g, "\\'");

            // Кнопка чата для всех пользователей
            const chatButton = `<button class="btn-chat" onclick="sendMessage(${userId})">💬 Написать</button>`;

            // Для вкладки "Все пользователи"
            if (currentTab === 'all') {
                const isFriend = isUserFriend(user);
                const isFollowing = isUserFollowing(user);

                if (isFriend) {
                    return `
            ${chatButton}
            <button class="btn-unfriend" onclick="removeFriend(${userId}, '${name}')">Удалить из друзей</button>
        `;
                }

                if (isFollowing) {
                    return `
        ${chatButton}
        <button class="btn-add-friend" onclick="addFriend(${userId}, '${name}')">Добавить в друзья</button>
        <button class="btn-unfriend" onclick="unsubscribe(${userId}, '${name}')">Отписаться</button>
    `;
                }

                return `
        ${chatButton}
        <button class="btn-add-friend" onclick="addFriend(${userId}, '${name}')">Добавить в друзья</button>
        <button class="btn-follow" onclick="followUser(${userId}, '${name}')">Подписаться</button>
    `;
            }
            // Для вкладки "Друзья"
            if (currentTab === 'friends') {
                return `
                    ${chatButton}
                    <button class="btn-unfriend" onclick="removeFriend(${userId}, '${name}')">Удалить</button>
                `;
            }

            // Для вкладки "Подписчики"
            if (currentTab === 'followers') {
                if (isUserFriend(user)) {
                    return `
                        ${chatButton}
                        <button class="btn-unfriend" onclick="removeFollower(${userId}, '${name}')">Удалить</button>
                    `;
                }

                return `
                    ${chatButton}
                    <button class="btn-add-friend" onclick="addFriend(${userId}, '${name}')">Добавить в друзья</button>
                    <button class="btn-remove-follower" onclick="removeFollower(${userId}, '${name}')">Удалить</button>
                `;
            }

            // Для вкладки "Подписки"
            if (currentTab === 'following') {
                if (isUserFriend(user)) {
                    return `
                        ${chatButton}
                        <button class="btn-unfriend" onclick="unsubscribe(${userId}, '${name}')">Отписаться</button>
                    `;
                }

                return `
                    ${chatButton}
                    <button class="btn-add-friend" onclick="addFriend(${userId}, '${name}')">Добавить в друзья</button>
                    <button class="btn-unfriend" onclick="unsubscribe(${userId}, '${name}')">Отписаться</button>
                `;
            }

            return chatButton;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function followUser(targetUserId, userName) {
            try {
                const response = await fetch(`${API_URL}/api/friends/${currentUserId}/follow/${targetUserId}`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    alert(await response.text());
                    return;
                }

                alert(`Вы подписались на ${userName}`);
                await loadFriendsData();

            } catch (error) {
                console.error(error);
                alert('Ошибка соединения с сервером');
            }
        }

        async function addFriend(targetUserId, userName) {
            try {
                const response = await fetch(`${API_URL}/api/friends/${currentUserId}/add/${targetUserId}`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    alert(await response.text());
                    return;
                }

                alert("Ваша заявка отправлена");
                await loadFriendsData();

            } catch (error) {
                console.error(error);
                alert('Ошибка соединения с сервером');
            }
        }

        async function removeFriend(friendId, friendName) {
            if (!confirm(`Удалить ${friendName} из друзей?`)) return;

            try {
                const response = await fetch(`${API_URL}/api/friends/${currentUserId}/friend/${friendId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    alert(await response.text());
                    return;
                }

                alert(`${friendName} удалён из друзей`);
                await loadFriendsData();

            } catch (error) {
                console.error(error);
                alert('Ошибка соединения с сервером');
            }
        }

        async function removeFollower(followerId, followerName) {
            if (!confirm(`Удалить ${followerName} из подписчиков?`)) return;

            try {
                const response = await fetch(`${API_URL}/api/friends/${currentUserId}/follower/${followerId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    alert(await response.text());
                    return;
                }

                alert(`${followerName} удалён из подписчиков`);
                await loadFriendsData();

            } catch (error) {
                console.error(error);
                alert('Ошибка соединения с сервером');
            }
        }

        async function unsubscribe(followingId, followingName) {
            if (!confirm(`Отписаться от ${followingName}?`)) return;

            try {
                const response = await fetch(`${API_URL}/api/friends/${currentUserId}/follow/${followingId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    alert(await response.text());
                    return;
                }

                alert(`Вы отписались от ${followingName}`);
                await loadFriendsData();

            } catch (error) {
                console.error(error);
                alert('Ошибка соединения с сервером');
            }
        }

        async function sendMessage(targetUserId) {
            try {
                const response = await fetch(`${API_URL}/api/chats/private/${currentUserId}/${targetUserId}`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    alert(await response.text());
                    return;
                }

                const chat = await response.json();
                window.location.href = `chat.html?chatId=${chat.id}`;

            } catch (error) {
                console.error(error);
                alert('Ошибка соединения с сервером');
            }
        }

        window.addEventListener('load', async () => {
            setupTabs();
            setupSearch();
            await loadFriendsData();
        });

        // Делаем функции глобальными
        window.removeFriend = removeFriend;
        window.removeFollower = removeFollower;
        window.unsubscribe = unsubscribe;
        window.addFriend = addFriend;
        window.sendMessage = sendMessage;
        window.followUser = followUser;
    </script>

</body>

</html>
