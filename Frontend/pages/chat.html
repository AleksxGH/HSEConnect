<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
    <title>HSE Connect — Сообщения · Чат</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Подключаем стили -->
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/chat.css">

    <!-- Подключаем Web Components -->
    <script src="../js/avatar.js"></script>
    <script src="../js/components.js" defer></script>

    <style>
        /* Дополнительные стили для корневых элементов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', system-ui, sans-serif;
            font-weight: 600;
            background: var(--bg, #eef3fb);
            color: var(--text, #24304a);
        }

        html,
        body {
            height: 100%;
        }

        /* Стили для пустого состояния */
        .empty-chat-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #adb5bd;
            padding: 40px;
        }

        .empty-chat-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-chat-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .empty-chat-hint {
            font-size: 13px;
            color: #ced4da;
        }

        /* Стили для разделителя даты */
        .date-separator {
            align-self: center;
            margin: 14px 0 10px;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(75, 89, 255, 0.12);
            color: #4b59ff;
            font-size: 12px;
            font-weight: 700;
        }

        /* Стили для подсказки выбора пользователя */
        .select-user-prompt {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 8px;
            background: linear-gradient(135deg, #4b59ff 0%, #6c7aff 100%);
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
        }

        .select-user-prompt:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(75, 89, 255, 0.3);
        }

        .select-user-prompt:active {
            transform: translateY(0);
        }

        .prompt-icon {
            font-size: 20px;
        }

        .prompt-text {
            font-size: 13px;
            font-weight: 600;
        }

        /* Разделитель */
        .dialogs-divider {
            height: 1px;
            background: #e9ecef;
            margin: 8px 0;
        }

        .dialog-name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .unread-preview {
            color: #24304a;
            font-weight: 700;
        }

        .chat-unread-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #4b59ff;
            display: inline-block;
            flex-shrink: 0;
            box-shadow: 0 0 0 4px rgba(75, 89, 255, 0.12);
        }
    </style>
</head>

<body>
    <!-- Web Components -->
    <hse-header></hse-header>

    <div class="page">
        <hse-sidebar></hse-sidebar>

        <main class="content">
            <div class="chat-container">
                <div class="dialogs-panel">
                    <div class="dialogs-header">
                        <h3>Диалоги</h3>
                    </div>
                    <!-- Подсказка для выбора пользователя -->
                    <div class="select-user-prompt" id="selectUserPrompt">
                        <span class="prompt-icon">🔎</span>
                        <span class="prompt-text">Найти пользователя</span>
                    </div>
                    <div class="dialogs-divider"></div>
                    <div class="dialogs-list" id="dialogsList"></div>
                </div>

                <div class="messages-area">
                    <div class="chat-header" id="chatHeader" style="display: none;">
                        <div class="chat-header-left" id="chatHeaderProfile"
                            style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <div class="chat-header-avatar" id="chatAvatar">А</div>
                            <div class="chat-header-info">
                                <h4 id="chatName">Алексей Смирнов</h4>
                                <span id="chatStatus">онлайн</span>
                            </div>
                        </div>
                    </div>

                    <!-- Пустое состояние чата -->
                    <div class="empty-chat-state" id="emptyChatState">
                        <div class="empty-chat-icon">💬</div>
                        <div class="empty-chat-text">Выберите диалог</div>
                        <div class="empty-chat-hint">Нажмите на чат слева, чтобы начать общение</div>
                    </div>

                    <div class="messages-list" id="messagesList" style="display: none;"></div>

                    <div class="input-area" id="inputArea" style="display: none;">
                        <input type="text" class="msg-input" id="messageInput" placeholder="Введите сообщение...">
                        <label class="file-label" id="fileLabel">
                            <img src="../icons/clip_icon.svg" alt="Прикрепить файл" class="clip-icon">
                            <input type="file" id="fileInput" style="display: none;" multiple>
                        </label>
                        <button class="send-btn" id="sendBtn">➤ Отправить</button>
                    </div>
                    <div id="filePreview"
                        style="padding: 0 18px 8px 18px; font-size: 11px; color:#4b59ff; display: none;"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="../scripts/api.js"></script>
    <script>
        function requireAuth() {
            const userId = localStorage.getItem('userId');

            if (!userId) {
                window.location.replace('auth.html');
            }
        }

        requireAuth();

        const currentUserId = Number(localStorage.getItem('userId'));
        const API_BASE = `${API_URL}/api/chats`;

        let chats = [];
        let messagesDB = {};
        let currentChatId = null;
        let typingSocket = null;
        let typingTimeout = null;
        const chatUrlParams = new URLSearchParams(window.location.search);
        const initialChatId = Number(chatUrlParams.get('chatId'));
        let currentFileList = [];
        let isSendingMessage = false;
        let chatSocket = null;

        function connectTypingSocket() {
            const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
            const host = API_URL.replace(/^https?:\/\//, "");

            typingSocket = new WebSocket(`${wsProtocol}://${host}/ws/typing?userId=${currentUserId}`);

            typingSocket.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === "typing" && data.chatId === currentChatId) {
                    document.getElementById("chatStatus").innerText = "печатает...";
                }

                if (data.type === "stop_typing" && data.chatId === currentChatId) {
                    document.getElementById("chatStatus").innerText = "онлайн";
                }
            };
        }

        function connectChatSocket() {
            const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
            const host = API_URL.replace(/^https?:\/\//, "");

            chatSocket = new WebSocket(`${wsProtocol}://${host}/ws/chat?userId=${currentUserId}`);

            chatSocket.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                if (data.type !== "message") return;

                const message = data.message;

                if (!messagesDB[message.chatId]) {
                    messagesDB[message.chatId] = [];
                }

                const alreadyExists = messagesDB[message.chatId].some(m => m.id === message.id);
                if (!alreadyExists) {
                    messagesDB[message.chatId].push(message);
                }

                const isCurrentChatOpen = message.chatId === currentChatId;
                const isIncomingMessage =
                    Number(message.senderId || message.fromUserId) !== currentUserId;

                if (isCurrentChatOpen) {
                    renderMessages();
                    openMessagesAtBottom();

                    if (isIncomingMessage) {
                        await markChatAsRead(currentChatId);
                    }
                }

                await loadChats();
                renderDialogs();
            };
        }

        function getCurrentChat() {
            return chats.find(chat => chat.id === currentChatId);
        }

        function sendTypingEvent(type) {
            const chat = getCurrentChat();

            if (!chat || !chat.otherUserId) return;
            if (!typingSocket || typingSocket.readyState !== WebSocket.OPEN) return;

            typingSocket.send(JSON.stringify({
                type: type,
                chatId: currentChatId,
                fromUserId: currentUserId,
                toUserId: chat.otherUserId
            }));
        }

        function handleTypingInput() {
            sendTypingEvent("typing");

            clearTimeout(typingTimeout);

            typingTimeout = setTimeout(() => {
                sendTypingEvent("stop_typing");
            }, 1200);
        }

        async function loadChats() {
            const response = await fetch(`${API_BASE}/user/${currentUserId}`);

            if (!response.ok) {
                throw new Error("Не удалось загрузить диалоги");
            }

            chats = await response.json();

            if (window.updateSidebarIcons) {
                await window.updateSidebarIcons();
            }
        }

        async function loadMessages(chatId) {
            const response = await fetch(`${API_BASE}/${chatId}/messages/user/${currentUserId}`);

            if (!response.ok) {
                throw new Error("Не удалось загрузить сообщения");
            }

            messagesDB[chatId] = await response.json();
        }

        function renderDialogs() {
            const container = document.getElementById("dialogsList");
            if (!container) return;

            container.innerHTML = "";

            if (chats.length === 0) {
                const emptyDiv = document.createElement("div");
                emptyDiv.className = "empty-dialogs";
                emptyDiv.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; color: #adb5bd;">
                        <div style="font-size: 48px; margin-bottom: 12px;">💬</div>
                        <div style="font-size: 13px;">Нет диалогов</div>
                        <div style="font-size: 11px; margin-top: 8px;">Начните общение с другом</div>
                    </div>
                `;
                container.appendChild(emptyDiv);
                return;
            }


            chats.forEach(chat => {
                const preview = chat.lastMessage || "Нет сообщений";

                const div = document.createElement("div");
                div.className = `dialog-item ${currentChatId === chat.id ? "active" : ""}`;

                div.innerHTML = `
    <div class="dialog-avatar">${escapeHtml(chat.avatarInitial)}</div>
    <div class="dialog-info">
        <div class="dialog-name-row">
            <div class="dialog-name">${escapeHtml(chat.name)}</div>
            ${chat.unreadCount > 0 ? `<span class="chat-unread-dot"></span>` : ""}
        </div>

        <div class="dialog-last ${chat.unreadCount > 0 ? "unread-preview" : ""}">
            ${escapeHtml(preview)}
        </div>
    </div>
`;

                div.addEventListener("click", async () => {
                    if (currentChatId === chat.id) {
                        await markChatAsRead(currentChatId);
                        await loadChats();
                        renderDialogs();

                        if (window.updateSidebarIcons) {
                            await window.updateSidebarIcons();
                        }

                        return;
                    }

                    currentChatId = chat.id;

                    await loadMessages(currentChatId);
                    await markChatAsRead(currentChatId);
                    await loadChats();

                    renderDialogs();
                    renderMessages();
                    updateChatHeader();
                    showChatInterface();
                    openMessagesAtBottom();
                    clearFilePreview();
                    focusMessageInput();
                });

                container.appendChild(div);
            });
        }

        async function markChatAsRead(chatId) {
            try {
                await fetch(`${API_BASE}/${chatId}/read/user/${currentUserId}`, {
                    method: "PUT"
                });
            } catch (error) {
                console.error("Не удалось отметить чат прочитанным", error);
            }
        }


        // Функция для показа интерфейса чата (скрываем пустое состояние)
        function showChatInterface() {
            const emptyState = document.getElementById("emptyChatState");
            const messagesList = document.getElementById("messagesList");
            const inputArea = document.getElementById("inputArea");
            const chatHeader = document.getElementById("chatHeader");
            const filePreview = document.getElementById("filePreview");

            if (emptyState) emptyState.style.display = "none";
            if (messagesList) messagesList.style.display = "flex";
            if (inputArea) inputArea.style.display = "flex";
            if (chatHeader) chatHeader.style.display = "flex";
            if (filePreview) filePreview.style.display = "block";
        }

        // Функция для скрытия интерфейса чата (показываем пустое состояние)
        function hideChatInterface() {
            const emptyState = document.getElementById("emptyChatState");
            const messagesList = document.getElementById("messagesList");
            const inputArea = document.getElementById("inputArea");
            const chatHeader = document.getElementById("chatHeader");
            const filePreview = document.getElementById("filePreview");

            if (emptyState) emptyState.style.display = "flex";
            if (messagesList) messagesList.style.display = "none";
            if (inputArea) inputArea.style.display = "none";
            if (chatHeader) chatHeader.style.display = "none";
            if (filePreview) filePreview.style.display = "none";
        }

        function updateChatHeader() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;

            document.getElementById("chatName").innerText = chat.name;
            document.getElementById("chatStatus").innerText = chat.status;
            document.getElementById("chatAvatar").innerText = chat.avatarInitial;

            // Создаём ссылку для аватарки и имени
            const chatHeaderLeft = document.getElementById("chatHeaderLeft");
            if (chatHeaderLeft && chat.otherUserId) {
                // Оборачиваем содержимое в ссылку
                const link = document.createElement('a');
                link.href = `./user.html?id=${chat.otherUserId}`;
                link.style.display = 'flex';
                link.style.alignItems = 'center';
                link.style.gap = '12px';
                link.style.textDecoration = 'none';
                link.style.color = 'inherit';

                // Перемещаем содержимое в ссылку
                const avatar = chatHeaderLeft.querySelector('.chat-header-avatar');
                const info = chatHeaderLeft.querySelector('.chat-header-info');

                chatHeaderLeft.innerHTML = '';
                link.appendChild(avatar.cloneNode(true));
                link.appendChild(info.cloneNode(true));
                chatHeaderLeft.appendChild(link);
            }
        }

        function renderMessages() {
            const messagesContainer = document.getElementById("messagesList");
            if (!messagesContainer) return;

            messagesContainer.innerHTML = "";

            const messages = messagesDB[currentChatId] || [];

            const uniqueMessages = Array.from(
                new Map(messages.map((msg) => {
                    const key =
                        msg.id ||
                        msg.messageId ||
                        `${msg.senderId || msg.fromUserId || msg.sender}-${msg.text || msg.content || msg.message || msg.body}-${msg.time || msg.createdAt || msg.sentAt}`;

                    return [key, msg];
                })).values()
            );

            uniqueMessages.sort((a, b) => {
                return (a.id || a.messageId || 0) - (b.id || b.messageId || 0);
            });

            if (uniqueMessages.length === 0) {
                const emptyMsg = document.createElement("div");
                emptyMsg.className = "empty-messages";
                emptyMsg.innerHTML = `
            <div style="text-align: center; padding: 40px; color: #adb5bd;">
                <div style="font-size: 48px; margin-bottom: 12px;">💭</div>
                <div style="font-size: 13px;">Нет сообщений</div>
                <div style="font-size: 11px; margin-top: 8px;">Напишите что-нибудь</div>
            </div>
        `;
                messagesContainer.appendChild(emptyMsg);
            } else {
                let lastRenderedDateKey = null;
                uniqueMessages.forEach(msg => {
                    const messageDate = msg.createdAt ? new Date(msg.createdAt) : null;
                    const dateKey = messageDate ? messageDate.toDateString() : "unknown";

                    if (dateKey !== lastRenderedDateKey) {
                        lastRenderedDateKey = dateKey;

                        const dateDiv = document.createElement("div");
                        dateDiv.className = "date-separator";
                        dateDiv.innerText = formatDateSeparator(messageDate);

                        messagesContainer.appendChild(dateDiv);
                    }

                    const text = msg.text || msg.content || msg.message || msg.body || "";
                    const time = msg.createdAt
                        ? new Date(msg.createdAt).toLocaleTimeString([], {
                            hour: "2-digit",
                            minute: "2-digit"
                        })
                        : (msg.time || "только что");
                    const isOutgoing =
                        msg.sender === "outgoing" ||
                        msg.senderId === currentUserId ||
                        msg.fromUserId === currentUserId;

                    const msgDiv = document.createElement("div");
                    msgDiv.className = `message ${isOutgoing ? "outgoing" : "incoming"}`;

                    msgDiv.innerHTML = `
                <div class="bubble">
                    ${text ? `<div>${escapeHtml(text)}</div>` : ""}
                    <div class="msg-meta">${escapeHtml(time)}</div>
                </div>
            `;

                    messagesContainer.appendChild(msgDiv);
                });
            }

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function formatDateSeparator(date) {
            if (!date) return "";

            const today = new Date();
            const yesterday = new Date();

            yesterday.setDate(today.getDate() - 1);

            if (date.toDateString() === today.toDateString()) {
                return "Сегодня";
            }

            if (date.toDateString() === yesterday.toDateString()) {
                return "Вчера";
            }

            return [
                String(date.getDate()).padStart(2, "0"),
                String(date.getMonth() + 1).padStart(2, "0"),
                date.getFullYear()
            ].join(".");
        }

        async function sendCurrentMessage() {
            if (isSendingMessage) return;

            const inputEl = document.getElementById("messageInput");
            const text = inputEl.value.trim();

            if (!text || currentChatId === null) return;

            isSendingMessage = true;

            try {
                const response = await fetch(`${API_BASE}/${currentChatId}/messages/user/${currentUserId}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    alert("Не удалось отправить сообщение");
                    return;
                }

                inputEl.value = "";

                await loadChats();
                await loadMessages(currentChatId);

                renderDialogs();
                renderMessages();
                updateChatHeader();
                clearFilePreview();
            } finally {
                isSendingMessage = false;
            }
        }

        function escapeHtml(str) {
            if (!str) return "";

            return String(str).replace(/[&<>]/g, function (m) {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });
        }

        function clearFilePreview() {
            const previewDiv = document.getElementById("filePreview");
            if (previewDiv) previewDiv.innerHTML = "";

            currentFileList = [];

            const fileInput = document.getElementById("fileInput");
            if (fileInput) fileInput.value = "";
        }

        function focusMessageInput() {
            const input = document.getElementById("messageInput");
            if (input) input.focus();
        }

        function onFilesSelected(event) {
            const files = Array.from(event.target.files);

            if (files.length) {
                currentFileList = files;

                const previewDiv = document.getElementById("filePreview");
                if (previewDiv) {
                    previewDiv.innerHTML = `<div class="attachment-preview">📎 Выбрано файлов: ${files.length}</div>`;
                }
            }
        }

        // Функция для перехода на страницу друзей
        function goToFriends() {
            window.location.href = 'friends.html';
        }

        function openMessagesAtBottom() {
            const messagesContainer = document.getElementById("messagesList");
            if (!messagesContainer) return;

            requestAnimationFrame(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        async function initChat() {
            try {
                await loadChats();
                connectTypingSocket();
                connectChatSocket();
                renderDialogs();

                if (initialChatId) {
                    const chatExists = chats.some(chat => chat.id === initialChatId);

                    if (chatExists) {
                        currentChatId = initialChatId;

                        await loadMessages(currentChatId);
                        await markChatAsRead(currentChatId);
                        await loadChats();

                        renderDialogs();
                        renderMessages();
                        updateChatHeader();
                        showChatInterface();
                        openMessagesAtBottom();
                        clearFilePreview();
                        focusMessageInput();
                    } else {
                        hideChatInterface();
                    }
                } else {
                    hideChatInterface();
                }

            } catch (error) {
                console.error(error);
                alert("Ошибка загрузки чатов. Проверь, запущен ли backend.");
            }

            const sendBtn = document.getElementById("sendBtn");
            const msgInput = document.getElementById("messageInput");
            const fileInputElem = document.getElementById("fileInput");
            const selectUserPrompt = document.getElementById("selectUserPrompt");

            if (msgInput) {
                msgInput.addEventListener("input", handleTypingInput);

                msgInput.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        sendCurrentMessage();
                    }
                });
            }

            if (sendBtn) sendBtn.addEventListener("click", sendCurrentMessage);

            if (fileInputElem) fileInputElem.addEventListener("change", onFilesSelected);

            if (selectUserPrompt) {
                selectUserPrompt.addEventListener("click", goToFriends);
            }
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initChat);
        } else {
            initChat();
        }
    </script>
</body>

</html>
