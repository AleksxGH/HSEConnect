<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
    <title>HSE Connect — Сообщения · Чат</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Подключаем стили -->
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/chat.css">
    
    <!-- Подключаем Web Components -->
    <script src="../js/components.js" defer></script>
    
    <style>
        /* Дополнительные стили для корневых элементов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', system-ui, sans-serif;
            font-weight: 600;
            background: var(--bg, #eef3fb);
            color: var(--text, #24304a);
        }
        
        html, body {
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- Web Components -->
    <hse-header></hse-header>

    <div class="page">
        <hse-sidebar></hse-sidebar>

        <main class="content">
            <div class="chat-container">
                <div class="dialogs-panel">
                    <div class="dialogs-header">
                        <h3>Диалоги</h3>
                    </div>
                    <div class="dialogs-list" id="dialogsList"></div>
                </div>

                <div class="messages-area">
                    <div class="chat-header" id="chatHeader">
                        <div class="chat-header-avatar" id="chatAvatar">А</div>
                        <div class="chat-header-info">
                            <h4 id="chatName">Алексей Смирнов</h4>
                            <span id="chatStatus">онлайн</span>
                        </div>
                    </div>
                    <div class="messages-list" id="messagesList"></div>
                    <div class="input-area">
                        <input type="text" class="msg-input" id="messageInput" placeholder="Введите сообщение..." autofocus>
                        <label class="file-label" id="fileLabel">
                            <img src="../icons/clip_icon.svg" alt="Прикрепить файл" class="clip-icon">
                            <input type="file" id="fileInput" style="display: none;" multiple>
                        </label>
                        <button class="send-btn" id="sendBtn">➤ Отправить</button>
                    </div>
                    <div id="filePreview" style="padding: 0 18px 8px 18px; font-size: 11px; color:#4b59ff;"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = "http://localhost:8080/api/chats";

        let chats = [];
        let messagesDB = {};
        let currentChatId = null;
        let currentFileList = [];

        async function loadChats() {
            const response = await fetch(API_BASE);

            if (!response.ok) {
                throw new Error("Не удалось загрузить диалоги");
            }

            chats = await response.json();

            if (chats.length > 0 && currentChatId === null) {
                currentChatId = chats[0].id;
            }
        }

        async function loadMessages(chatId) {
            const response = await fetch(`${API_BASE}/${chatId}/messages`);

            if (!response.ok) {
                throw new Error("Не удалось загрузить сообщения");
            }

            messagesDB[chatId] = await response.json();
        }

        function renderDialogs() {
            const container = document.getElementById("dialogsList");
            if (!container) return;

            container.innerHTML = "";

            chats.forEach(chat => {
                const preview = chat.lastMessage || "Нет сообщений";

                const div = document.createElement("div");
                div.className = `dialog-item ${currentChatId === chat.id ? "active" : ""}`;

                div.innerHTML = `
                <div class="dialog-avatar">${escapeHtml(chat.avatarInitial)}</div>
                <div class="dialog-info">
                    <div class="dialog-name">${escapeHtml(chat.name)}</div>
                    <div class="dialog-last">${escapeHtml(preview)}</div>
                </div>
            `;

                div.addEventListener("click", async () => {
                    if (currentChatId === chat.id) return;

                    currentChatId = chat.id;

                    await loadMessages(currentChatId);

                    renderDialogs();
                    renderMessages();
                    updateChatHeader();
                    clearFilePreview();
                    focusMessageInput();
                });
                
                container.appendChild(div);
            });
        }

        function updateChatHeader() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;

            document.getElementById("chatName").innerText = chat.name;
            document.getElementById("chatStatus").innerText = chat.status;
            document.getElementById("chatAvatar").innerText = chat.avatarInitial;
        }

        function renderMessages() {
            const messagesContainer = document.getElementById("messagesList");
            if (!messagesContainer) return;

            messagesContainer.innerHTML = "";

            const messages = messagesDB[currentChatId] || [];

            messages.forEach(msg => {
                const msgDiv = document.createElement("div");
                msgDiv.className = `message ${msg.sender === "outgoing" ? "outgoing" : "incoming"}`;

                msgDiv.innerHTML = `
                <div class="bubble">
                    ${msg.text ? `<div>${escapeHtml(msg.text)}</div>` : ""}
                    <div class="msg-meta">${escapeHtml(msg.time || "только что")}</div>
                </div>
            `;

                messagesContainer.appendChild(msgDiv);
            });

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function sendCurrentMessage() {
            const inputEl = document.getElementById("messageInput");
            const text = inputEl.value.trim();

            if (!text || currentChatId === null) return;

            const response = await fetch(`${API_BASE}/${currentChatId}/messages`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text })
            });

            if (!response.ok) {
                alert("Не удалось отправить сообщение");
                return;
            }

            inputEl.value = "";

            await loadChats();
            await loadMessages(currentChatId);

            renderDialogs();
            renderMessages();
            updateChatHeader();
            clearFilePreview();
        }

        function escapeHtml(str) {
            if (!str) return "";

            return String(str).replace(/[&<>]/g, function (m) {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });
        }

        function clearFilePreview() {
            const previewDiv = document.getElementById("filePreview");
            if (previewDiv) previewDiv.innerHTML = "";

            currentFileList = [];

            const fileInput = document.getElementById("fileInput");
            if (fileInput) fileInput.value = "";
        }

        function focusMessageInput() {
            const input = document.getElementById("messageInput");
            if (input) input.focus();
        }

        function onFilesSelected(event) {
            const files = Array.from(event.target.files);

            if (files.length) {
                currentFileList = files;

                const previewDiv = document.getElementById("filePreview");
                if (previewDiv) {
                    previewDiv.innerHTML = `<div class="attachment-preview">📎 Выбрано файлов: ${files.length}</div>`;
                }
            }
        }

        async function initChat() {
            try {
                await loadChats();

                if (currentChatId !== null) {
                    await loadMessages(currentChatId);
                }

                renderDialogs();
                renderMessages();
                updateChatHeader();
            } catch (error) {
                console.error(error);
                alert("Ошибка загрузки чатов. Проверь, запущен ли backend.");
            }

            const sendBtn = document.getElementById("sendBtn");
            const msgInput = document.getElementById("messageInput");
            const fileInputElem = document.getElementById("fileInput");

            if (sendBtn) sendBtn.addEventListener("click", sendCurrentMessage);

            if (msgInput) {
                msgInput.addEventListener("keypress", (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        sendCurrentMessage();
                    }
                });
            }

            if (fileInputElem) fileInputElem.addEventListener("change", onFilesSelected);
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initChat);
        } else {
            initChat();
        }
    </script>
</body>
</html>
