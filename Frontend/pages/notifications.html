<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Уведомления — HSE Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/notifications.css">
    
    <script src="../js/components.js" defer></script>
    
    <style>
        html, body {
            height: 100%;
        }
        
        body {
            display: flex;
            flex-direction: column;
        }
        
        .page {
            display: grid;
            grid-template-columns: 210px 1fr;
            gap: 18px;
            padding: 14px 16px 18px;
            flex: 1;           
            min-height: 0;      
        }
        
        .content {
            min-width: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .notifications-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .notifications-list-container {
            flex: 1;
        }
        
        @media (max-width: 900px) {
            .page {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <hse-header></hse-header>
    
    <div class="page">
        <hse-sidebar></hse-sidebar>
        
        <main class="content">
            <div class="notifications-section">
                <div class="notifications-header">
                    <h1>Уведомления</h1>
                </div>
                
                <div class="notifications-tabs">
                    <button class="tab-btn active" data-tab="new">Новые</button>
                    <button class="tab-btn" data-tab="viewed">Просмотренные</button>
                </div>
                
                <div class="notifications-list-container" id="notificationsContainer">
                    <!-- Уведомления будут загружены через JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentTab = 'new';
        
        // Данные уведомлений
        let notifications = [
            {
                id: 1,
                type: "friend_request",
                text: "<strong>Анна Кузнецова</strong> хочет добавить вас в друзья",
                time: "5 минут назад",
                read: false,
                viewed: false,
                actionable: true,
                userId: 5,
                userName: "Анна Кузнецова"
            },
            {
                id: 2,
                type: "new_follower",
                text: "<strong>Дмитрий Иванов</strong> подписался на вас",
                time: "1 час назад",
                read: false,
                viewed: false,
                actionable: false,
                userId: 6,
                userName: "Дмитрий Иванов"
            },
            {
                id: 3,
                type: "friend_request_accepted",
                text: "<strong>Мария Соколова</strong> приняла ваш запрос в друзья",
                time: "3 часа назад",
                read: true,
                viewed: true,
                actionable: false,
                userId: 7,
                userName: "Мария Соколова"
            },
            {
                id: 4,
                type: "friend_created_event",
                text: "<strong>Алексей Смирнов</strong> создал новое событие «Хакатон по ML»",
                time: "вчера",
                read: true,
                viewed: true,
                actionable: false,
                userId: 1,
                userName: "Алексей Смирнов",
                eventName: "Хакатон по ML"
            },
            {
                id: 5,
                type: "event_going",
                text: "<strong>Екатерина Тихонова</strong> отметила «Пойду» на ваше событие «Подготовка к экзамену»",
                time: "вчера",
                read: false,
                viewed: false,
                actionable: false,
                userId: 4,
                userName: "Екатерина Тихонова",
                eventName: "Подготовка к экзамену"
            },
            {
                id: 6,
                type: "friend_request",
                text: "<strong>Павел Морозов</strong> хочет добавить вас в друзья",
                time: "2 дня назад",
                read: true,
                viewed: true,
                actionable: true,
                userId: 8,
                userName: "Павел Морозов"
            },
            {
                id: 7,
                type: "friend_created_event",
                text: "<strong>Даниил Воробьёв</strong> создал новое событие «Футбольный турнир»",
                time: "3 дня назад",
                read: true,
                viewed: true,
                actionable: false,
                userId: 3,
                userName: "Даниил Воробьёв",
                eventName: "Футбольный турнир"
            },
            {
                id: 8,
                type: "event_invite",
                text: "<strong>Алексей Смирнов</strong> приглашает вас на событие «Вечеринка в БК»",
                time: "30 минут назад",
                read: false,
                viewed: false,
                actionable: true,
                userId: 1,
                userName: "Алексей Смирнов",
                eventName: "Вечеринка в БК"
            }
        ];
        
        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentTab = tab.getAttribute('data-tab');
                    renderNotifications();
                });
            });
        }
        
        function getIconSvg(type) {
            switch(type) {
                case 'friend_request':
                    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>`;
                case 'new_follower':
                    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>`;
                case 'friend_request_accepted':
                    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>`;
                case 'friend_created_event':
                    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>`;
                case 'event_going':
                    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                <polyline points="22 4 12 14.01 9 11.01"/>
                            </svg>`;
                case 'event_invite':
                    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                            </svg>`;
                default:
                    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>`;
            }
        }
        
        function acceptFriendRequest(notificationId, userName) {
            const notification = notifications.find(n => n.id === notificationId);
            if (notification) {
                notification.type = 'friend_request_accepted';
                notification.text = `<strong>${userName}</strong> теперь ваш друг`;
                notification.actionable = false;
                notification.read = true;
                notification.viewed = true;
                renderNotifications();
                alert(`Вы приняли запрос в друзья от ${userName}`);
            }
        }
        
        function declineFriendRequest(notificationId, userName) {
            const index = notifications.findIndex(n => n.id === notificationId);
            if (index !== -1) {
                notifications.splice(index, 1);
                renderNotifications();
                alert(`Вы отклонили запрос от ${userName}`);
            }
        }
        
        function acceptEventInvite(notificationId, eventName) {
            const notification = notifications.find(n => n.id === notificationId);
            if (notification) {
                notification.type = 'event_going';
                notification.text = `<strong>Вы</strong> приняли приглашение на событие «${eventName}»`;
                notification.actionable = false;
                notification.read = true;
                notification.viewed = true;
                renderNotifications();
                alert(`Вы приняли приглашение на событие "${eventName}"`);
            }
        }
        
        function declineEventInvite(notificationId, eventName) {
            const index = notifications.findIndex(n => n.id === notificationId);
            if (index !== -1) {
                notifications.splice(index, 1);
                renderNotifications();
                alert(`Вы отклонили приглашение на событие "${eventName}"`);
            }
        }
        
        function renderNotifications() {
            const container = document.getElementById('notificationsContainer');
            if (!container) return;
            
            let filteredNotifications;
            if (currentTab === 'new') {
                filteredNotifications = notifications.filter(n => !n.viewed);
            } else {
                filteredNotifications = notifications.filter(n => n.viewed);
            }
            
            if (filteredNotifications.length === 0) {
                const emptyText = currentTab === 'new' ? 'Нет новых уведомлений' : 'Нет просмотренных уведомлений';
                container.innerHTML = `
                    <div class="empty-notifications">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="#8792b0" stroke-width="1.5">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <p>${emptyText}</p>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="notification-list">';
            filteredNotifications.forEach(notification => {
                const unreadClass = !notification.read && !notification.viewed ? 'unread' : '';
                html += `
                    <div class="notification-item ${unreadClass}">
                        <div class="notification-icon">
                            ${getIconSvg(notification.type)}
                        </div>
                        <div class="notification-content">
                            <div class="notification-text">${notification.text}</div>
                            <div class="notification-time">${notification.time}</div>
                        </div>
                        ${notification.actionable && notification.type === 'friend_request' ? `
                            <div class="notification-actions">
                                <button class="btn-accept" onclick="acceptFriendRequest(${notification.id}, '${notification.userName}')">Принять</button>
                                <button class="btn-decline" onclick="declineFriendRequest(${notification.id}, '${notification.userName}')">Отклонить</button>
                            </div>
                        ` : ''}
                        ${notification.actionable && notification.type === 'event_invite' ? `
                            <div class="notification-actions">
                                <button class="btn-accept" onclick="acceptEventInvite(${notification.id}, '${notification.eventName}')">Пойду</button>
                                <button class="btn-decline" onclick="declineEventInvite(${notification.id}, '${notification.eventName}')">Отказаться</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }
        
        window.addEventListener('load', () => {
            setupTabs();
            renderNotifications();
        });
        
        window.acceptFriendRequest = acceptFriendRequest;
        window.declineFriendRequest = declineFriendRequest;
        window.acceptEventInvite = acceptEventInvite;
        window.declineEventInvite = declineEventInvite;
    </script>
</body>
</html>
