<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
    <title>HSE Connect — Сообщения · Чат</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Подключаем стили -->
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/chat.css">
    
    <!-- Подключаем Web Components -->
    <script src="../js/components.js" defer></script>
    
    <style>
        /* Дополнительные стили для корневых элементов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', system-ui, sans-serif;
            font-weight: 600;
            background: var(--bg, #eef3fb);
            color: var(--text, #24304a);
        }
        
        html, body {
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- Web Components -->
    <hse-header></hse-header>

    <div class="page">
        <hse-sidebar></hse-sidebar>
        
        <main class="content">
            <div class="chat-container">
                <div class="dialogs-panel">
                    <div class="dialogs-header"><h3>Диалоги</h3></div>
                    <div class="dialogs-list" id="dialogsList"></div>
                </div>

                <div class="messages-area">
                    <div class="chat-header" id="chatHeader">
                        <div class="chat-header-avatar" id="chatAvatar">А</div>
                        <div class="chat-header-info">
                            <h4 id="chatName">Алексей Смирнов</h4>
                            <span id="chatStatus">онлайн</span>
                        </div>
                    </div>
                    <div class="messages-list" id="messagesList"></div>
                    <div class="input-area">
                        <input type="text" class="msg-input" id="messageInput" placeholder="Введите сообщение..." autofocus>
                        <label class="file-label" id="fileLabel">
                            <img src="../icons/clip_icon.svg" alt="Прикрепить файл" class="clip-icon">
                            <input type="file" id="fileInput" style="display: none;" multiple>
                        </label>
                        <button class="send-btn" id="sendBtn">➤ Отправить</button>
                    </div>
                    <div id="filePreview" style="padding: 0 18px 8px 18px; font-size: 11px; color:#4b59ff;"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const contacts = [
            { id: 1, name: "Алексей Смирнов", avatarInitial: "А", status: "онлайн" },
            { id: 2, name: "Мария Ковальчук", avatarInitial: "М", status: "была вчера" },
            { id: 3, name: "Даниил Воробьёв", avatarInitial: "Д", status: "печатает..." },
            { id: 4, name: "Екатерина Тихонова", avatarInitial: "Е", status: "онлайн" }
        ];

        let messagesDB = {
            1: [
                { id: "m1", text: "Привет! Как дела с проектом?", sender: "incoming", time: "12:45", files: [] },
                { id: "m2", text: "Всё отлично, сегодня обсудим архитектуру", sender: "outgoing", time: "12:47", files: [] }
            ],
            2: [
                { id: "m21", text: "Привет! Зацени статью по нейросетям", sender: "incoming", time: "10:20", files: [] }
            ],
            3: [
                { id: "m31", text: "В субботу футбол в 18:00, будешь?", sender: "incoming", time: "вчера", files: [] }
            ],
            4: [
                { id: "m41", text: "Хей! Нашёл баги в коде?", sender: "incoming", time: "15:12", files: [] }
            ]
        };

        let currentContactId = 1;
        let currentFileList = [];

        function renderDialogs() {
            const container = document.getElementById("dialogsList");
            if (!container) return;
            container.innerHTML = "";
            
            contacts.forEach(contact => {
                const msgs = messagesDB[contact.id] || [];
                const lastMsgObj = msgs.length ? msgs[msgs.length - 1] : null;
                let preview = "Нет сообщений";
                
                if (lastMsgObj && lastMsgObj.text) {
                    preview = lastMsgObj.text.substring(0, 35);
                }
                
                const div = document.createElement("div");
                div.className = `dialog-item ${currentContactId === contact.id ? "active" : ""}`;
                div.setAttribute("data-id", contact.id);
                div.innerHTML = `
                    <div class="dialog-avatar">${contact.avatarInitial}</div>
                    <div class="dialog-info">
                        <div class="dialog-name">${escapeHtml(contact.name)}</div>
                        <div class="dialog-last">${escapeHtml(preview)}</div>
                    </div>
                `;
                
                div.addEventListener("click", () => {
                    if (currentContactId === contact.id) return;
                    currentContactId = contact.id;
                    renderDialogs();
                    renderMessages();
                    updateChatHeader();
                    clearFilePreview();
                    focusMessageInput();
                });
                
                container.appendChild(div);
            });
        }

        function updateChatHeader() {
            const contact = contacts.find(c => c.id === currentContactId);
            if (contact) {
                document.getElementById("chatName").innerText = contact.name;
                document.getElementById("chatStatus").innerText = contact.status;
                document.getElementById("chatAvatar").innerText = contact.avatarInitial;
            }
        }

        function renderMessages() {
            const messagesContainer = document.getElementById("messagesList");
            if (!messagesContainer) return;
            messagesContainer.innerHTML = "";
            
            const msgs = messagesDB[currentContactId] || [];
            msgs.forEach(msg => {
                const msgDiv = document.createElement("div");
                msgDiv.className = `message ${msg.sender === "outgoing" ? "outgoing" : "incoming"}`;
                
                msgDiv.innerHTML = `
                    <div class="bubble">
                        ${msg.text ? `<div>${escapeHtml(msg.text)}</div>` : ""}
                        <div class="msg-meta">${msg.time || "только что"}</div>
                    </div>
                `;
                
                messagesContainer.appendChild(msgDiv);
            });
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function addMessage(contactId, messageText) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            const newMsg = {
                id: Date.now(),
                text: messageText,
                sender: "outgoing",
                time: timeStr,
                files: []
            };
            
            if (!messagesDB[contactId]) messagesDB[contactId] = [];
            messagesDB[contactId].push(newMsg);
            
            if (currentContactId === contactId) renderMessages();
            renderDialogs();
        }

        function sendCurrentMessage() {
            const inputEl = document.getElementById("messageInput");
            const text = inputEl.value.trim();
            
            if (text === "") return;
            
            addMessage(currentContactId, text);
            inputEl.value = "";
            clearFilePreview();
        }

        function clearFilePreview() {
            const previewDiv = document.getElementById("filePreview");
            if (previewDiv) previewDiv.innerHTML = "";
            currentFileList = [];
        }

        function focusMessageInput() {
        const input = document.getElementById("messageInput");
        if (input) {
            input.focus();
        }
}

        function onFilesSelected(event) {
            const files = Array.from(event.target.files);
            if (files.length) {
                currentFileList = files;
                const previewDiv = document.getElementById("filePreview");
                if (previewDiv) {
                    previewDiv.innerHTML = `<div class="attachment-preview">📎 Выбрано файлов: ${files.length}</div>`;
                }
            }
        }

        function initChat() {
            renderDialogs();
            renderMessages();
            updateChatHeader();
            
            const sendBtn = document.getElementById("sendBtn");
            const msgInput = document.getElementById("messageInput");
            const fileInputElem = document.getElementById("fileInput");
            
            if (sendBtn) sendBtn.addEventListener("click", sendCurrentMessage);
            if (msgInput) {
                msgInput.addEventListener("keypress", (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        sendCurrentMessage();
                    }
                });
            }
            if (fileInputElem) fileInputElem.addEventListener("change", onFilesSelected);
            
            const fileLabel = document.getElementById("fileLabel");
            if (fileLabel && fileInputElem) {
                fileLabel.addEventListener("click", () => {
                    fileInputElem.click();
                });
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initChat);
        } else {
            initChat();
        }
    </script>
</body>
</html>
